apiVersion: apps/v1
kind: Deployment
metadata:
  name: drainable-service
  labels:
    app: drainable-service
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 0
  selector:
    matchLabels:
      app: drainable-service
  template:
    metadata:
      labels:
        app: drainable-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: drainable-service
          image: ghcr.io/emilvorre/drainable-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # `SLEEP_MS` is the per-request server-side latency in milliseconds.
            # Overlays set this to a value that is large enough that requests
            # are *catchable* in flight during a rollout (typically 500ms);
            # the base ships a 250ms default so the workload still has
            # measurable in-flight requests if someone applies the base
            # directly. SLEEP_MS=0 makes requests sub-millisecond which makes
            # it effectively impossible to observe drop behavior.
            - name: SLEEP_MS
              value: "250"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
          # terminationGracePeriodSeconds and preStop are patched per overlay
---
apiVersion: v1
kind: Service
metadata:
  name: drainable-service
  labels:
    app: drainable-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
      nodePort: 30080
  selector:
    app: drainable-service
