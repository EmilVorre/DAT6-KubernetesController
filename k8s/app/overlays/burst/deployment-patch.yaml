apiVersion: apps/v1
kind: Deployment
metadata:
  name: drainable-service
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: drainable-service
          env:
            - name: SLEEP_MS
              value: "0"
            - name: BURST_MODE
              value: "1"
          # Burst RPS is driven by load generator; service just logs
