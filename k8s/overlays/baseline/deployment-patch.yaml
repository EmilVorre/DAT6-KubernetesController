# Baseline — no graceful shutdown, no controller strategy.
#
# Deliberately omits `DAT6_GRACEFUL_DRAIN`: the process inherits the kernel
# default for SIGTERM and dies immediately, dropping in-flight requests. This
# is what we want to measure against for S1/S2.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drainable-service
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: drainable-service
          env:
            - name: SLEEP_MS
              value: "2000"
            - name: DAT6_GRACEFUL_DRAIN
              value: "0"
            - name: DAT6_DRAIN_MAX_SECS
              value: "0"
      # No preStop — baseline for comparison.
